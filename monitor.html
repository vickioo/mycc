<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>系统监控 - AI Team Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-brand {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        
        /* Header */
        header {
            text-align: center;
            color: white;
            padding: 20px;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        .last-update {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        /* Health Score */
        .health-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .health-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#4ade80 var(--score), #e0e0e0 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .score-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-value { font-size: 3em; font-weight: bold; color: #4ade80; }
        .score-label { font-size: 0.9em; color: #666; }
        .health-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            flex: 1;
            min-width: 300px;
        }
        .health-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .health-item-icon { font-size: 2em; margin-bottom: 10px; }
        .health-item-value { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .health-item-label { font-size: 0.85em; color: #666; margin-top: 5px; }
        
        /* Service Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .service-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .service-card:hover { transform: translateY(-5px); }
        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .service-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2em;
            font-weight: 600;
        }
        .service-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .status-online { background: #4ade80; color: white; }
        .status-offline { background: #f87171; color: white; }
        .status-warning { background: #fbbf24; color: white; }
        .service-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .service-detail {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .detail-label { color: #666; font-size: 0.9em; }
        .detail-value { font-weight: 600; color: #333; }
        
        /* Messages Timeline */
        .messages-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .messages-title { font-size: 1.5em; font-weight: 600; }
        .clear-btn {
            background: #f87171;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        .message-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .message-icon { font-size: 1.5em; }
        .message-content { flex: 1; }
        .message-text { font-size: 0.95em; color: #333; margin-bottom: 5px; }
        .message-time { font-size: 0.8em; color: #999; }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .action-btn {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .action-icon { font-size: 2em; margin-bottom: 10px; }
        .action-title { font-weight: 600; color: #333; }
        
        /* Footer */
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
        }
        
        /* Auto-refresh indicator */
        .refresh-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }
        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-left">
                <a href="/" class="nav-brand">🏠 AI Team</a>
                <div class="nav-links">
                    <a href="/chat" class="nav-link">💬 对话</a>
                    <a href="/kb-docs" class="nav-link">📚 知识库</a>
                    <a href="/projects" class="nav-link">📋 看板</a>
                    <a href="/lobster" class="nav-link">🦞 龙虾</a>
                </div>
            </div>
        </div>
        
        <!-- Header -->
        <header>
            <h1>📊 系统监控看板</h1>
            <p>实时监控系统健康状态和服务运行情况</p>
            <div class="last-update" id="lastUpdate">🕐 最后更新：--:--:--</div>
        </header>
        
        <!-- Health Score -->
        <div class="health-section">
            <div class="health-score">
                <div class="score-circle" id="scoreCircle" style="--score: 0%">
                    <div class="score-inner">
                        <div class="score-value" id="scoreValue">--</div>
                        <div class="score-label">健康度</div>
                    </div>
                </div>
                <div class="health-details">
                    <div class="health-item">
                        <div class="health-item-icon">🤖</div>
                        <div class="health-item-value" id="agentCount">0/3</div>
                        <div class="health-item-label">可用 Agent</div>
                    </div>
                    <div class="health-item">
                        <div class="health-item-icon">📡</div>
                        <div class="health-item-value" id="serviceCount">0/0</div>
                        <div class="health-item-label">运行服务</div>
                    </div>
                    <div class="health-item">
                        <div class="health-item-icon">💬</div>
                        <div class="health-item-value" id="chatCount">0</div>
                        <div class="health-item-label">今日对话</div>
                    </div>
                    <div class="health-item">
                        <div class="health-item-icon">📄</div>
                        <div class="health-item-value" id="docCount">120+</div>
                        <div class="health-item-label">文档数量</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Services -->
        <div class="health-section">
            <h2 style="margin-bottom: 20px;">🔧 服务状态</h2>
            <div class="services-grid" id="servicesGrid">
                <!-- Services will be loaded here -->
            </div>
        </div>
        
        <!-- Messages -->
        <div class="messages-section">
            <div class="messages-header">
                <div class="messages-title">📜 最新消息</div>
                <button class="clear-btn" onclick="clearMessages()">清空</button>
            </div>
            <div class="messages-list" id="messagesList">
                <div style="text-align: center; color: #999; padding: 40px;">暂无消息</div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <div class="action-btn" onclick="window.location.href='/chat'">
                <div class="action-icon">💬</div>
                <div class="action-title">AI 对话</div>
                <div class="action-desc">开始对话</div>
            </div>
            <div class="action-btn" onclick="window.location.href='/kb-docs'">
                <div class="action-icon">📚</div>
                <div class="action-title">知识库</div>
                <div class="action-desc">查看文档</div>
            </div>
            <div class="action-btn" onclick="checkAllServices()">
                <div class="action-icon">🔄</div>
                <div class="action-title">刷新状态</div>
                <div class="action-desc">立即检查</div>
            </div>
            <div class="action-btn" onclick="window.location.href='/'">
                <div class="action-icon">🏠</div>
                <div class="action-title">返回主页</div>
                <div class="action-desc">AI Team Hub</div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>AI Team Hub · 系统监控看板</p>
            <p style="margin-top: 10px; font-size: 0.9em;">自动刷新间隔：10 秒</p>
        </footer>
    </div>
    
    <!-- Refresh Indicator -->
    <div class="refresh-indicator">
        <div class="refresh-dot"></div>
        <span>实时监控中</span>
    </div>
    
    <script>
        let messages = [];
        let services = [
            { name: 'API 服务', icon: '🔌', url: '/api/health', port: 8772 },
            { name: '知识库', icon: '📚', url: '/kb-docs', port: 8772 },
            { name: 'free-claude', icon: '🤖', url: 'http://localhost:8083/', port: 8083 },
            { name: 'mycc', icon: '🎯', url: 'http://localhost:8082/', port: 8082, optional: true }
        ];
        
        // Update time
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = '🕐 最后更新：' + timeStr;
        }
        
        // Check service
        async function checkService(service) {
            try {
                const response = await fetch(service.url, { 
                    method: 'GET',
                    cache: 'no-cache',
                    signal: AbortSignal.timeout(3000)
                });
                return {
                    name: service.name,
                    icon: service.icon,
                    status: response.ok ? 'online' : 'offline',
                    port: service.port,
                    responseTime: '--'
                };
            } catch (e) {
                return {
                    name: service.name,
                    icon: service.icon,
                    status: 'offline',
                    port: service.port,
                    responseTime: '--',
                    error: e.message
                };
            }
        }
        
        // Render services
        function renderServices(serviceStatuses) {
            const grid = document.getElementById('servicesGrid');
            let onlineCount = 0;
            
            grid.innerHTML = serviceStatuses.map(s => {
                if (s.status === 'online') onlineCount++;
                return `
                    <div class="service-card">
                        <div class="service-header">
                            <div class="service-name">${s.icon} ${s.name}</div>
                            <span class="service-status ${s.status === 'online' ? 'status-online' : s.status === 'warning' ? 'status-warning' : 'status-offline'}">
                                ${s.status === 'online' ? '● 运行中' : '● 已停止'}
                            </span>
                        </div>
                        <div class="service-details">
                            <div class="service-detail">
                                <span class="detail-label">端口</span>
                                <span class="detail-value">${s.port}</span>
                            </div>
                            <div class="service-detail">
                                <span class="detail-label">响应时间</span>
                                <span class="detail-value">${s.responseTime}</span>
                            </div>
                            ${s.error ? `<div class="service-detail"><span class="detail-label">错误</span><span class="detail-value" style="color: #f87171;">${s.error}</span></div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Update counts
            document.getElementById('serviceCount').textContent = `${onlineCount}/${services.length}`;
            
            // Calculate health score
            const healthScore = Math.round((onlineCount / services.length) * 100);
            document.getElementById('scoreValue').textContent = healthScore;
            document.getElementById('scoreCircle').style.setProperty('--score', `${healthScore}%`);
            
            // Add message
            if (onlineCount === services.length) {
                addMessage('success', `所有 ${onlineCount} 个服务运行正常`);
            } else if (onlineCount < services.length - 1) {
                addMessage('warning', `${services.length - onlineCount} 个服务异常`);
            }
        }
        
        // Check all services
        async function checkAllServices() {
            const statuses = await Promise.all(services.map(checkService));
            renderServices(statuses);
            updateTime();
        }
        
        // Add message
        function addMessage(type, text) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            
            messages.unshift({ type, text, time: timeStr });
            if (messages.length > 20) messages.pop();
            
            renderMessages();
        }
        
        // Render messages
        function renderMessages() {
            const list = document.getElementById('messagesList');
            if (messages.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无消息</div>';
                return;
            }
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            list.innerHTML = messages.map(m => `
                <div class="message-item">
                    <div class="message-icon">${icons[m.type] || 'ℹ️'}</div>
                    <div class="message-content">
                        <div class="message-text">${m.text}</div>
                        <div class="message-time">${m.time}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Clear messages
        function clearMessages() {
            messages = [];
            renderMessages();
            addMessage('info', '消息已清空');
        }
        
        // Load chat history count
        async function loadChatCount() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                const count = data.history ? data.history.length : 0;
                document.getElementById('chatCount').textContent = count;
            } catch (e) {
                // Ignore
            }
        }
        
        // Initialize
        addMessage('info', '系统监控已启动');
        checkAllServices();
        loadChatCount();
        
        // Auto refresh every 10 seconds
        setInterval(() => {
            checkAllServices();
            loadChatCount();
        }, 10000);
    </script>
</body>
</html>

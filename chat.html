<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话 - AI Team Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 0.9em; }
        
        .chat-main { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex: 1; background: white; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; }
        
        .agent-bar { padding: 10px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; gap: 10px; align-items: center; overflow-x: auto; }
        .agent-pill { padding: 6px 15px; background: white; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9em; }
        .agent-pill.active { background: #667eea; color: white; border-color: transparent; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 12px 18px; border-radius: 18px; line-height: 1.6; position: relative; }
        .user .msg-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; }
        .assistant .msg-bubble { background: white; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom-left-radius: 4px; }
        
        /* 思考过程样式 */
        .thought-panel { margin-bottom: 10px; font-size: 0.85em; color: #666; border-left: 3px solid #667eea; padding-left: 10px; background: #f0f4ff; border-radius: 4px; overflow: hidden; }
        .thought-panel summary { padding: 5px; cursor: pointer; outline: none; list-style: none; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .thought-panel summary::before { content: '🧠'; }
        .thought-content { padding: 10px; color: #555; font-style: italic; white-space: pre-wrap; border-top: 1px solid #dee2e6; }
        
        /* 执行日志样式 */
        .log-panel { margin-top: 10px; font-family: monospace; font-size: 0.8em; color: #2d3436; background: #fdf6e3; border-radius: 4px; }
        .log-panel summary { padding: 5px; cursor: pointer; outline: none; list-style: none; display: flex; align-items: center; gap: 5px; opacity: 0.7; }
        .log-panel summary::before { content: '📝'; }
        .log-content { padding: 10px; white-space: pre-wrap; border-top: 1px dashed #ccc; }

        .input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .input-box { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; resize: none; max-height: 100px; }
        .send-btn { background: #667eea; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>AI Team - 多 Agent 指挥部</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="color: white; font-size: 0.9em; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="voiceToggle" checked> 🔊 语音
            </label>
            <a href="/" class="nav-btn">🏠 主页</a>
            <a href="/monitor" class="nav-btn">📊 监控</a>
        </div>
    </div>
    
    <style>
        /* 新增：设备分类样式 */
        .device-group { margin-bottom: 5px; font-size: 0.75em; color: rgba(255,255,255,0.6); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .agent-bar { 
            padding: 10px; 
            background: #2d3436; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            width: 180px; 
            border-right: 1px solid #444;
            transition: all 0.3s;
        }
        .chat-container { flex: 1; background: white; border-radius: 0; display: flex; flex-direction: row; overflow: hidden; }
        .agent-pill { 
            padding: 10px 15px; 
            background: rgba(255,255,255,0.05); 
            border: none; 
            color: #ccc; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.85em; 
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .agent-pill.active { background: #667eea; color: white; box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
        .agent-pill::before { content: '🔘'; font-size: 0.8em; }
        .agent-pill.active::before { content: '🔵'; }
        
        /* 移动端收纳适配 */
        @media (max-width: 600px) {
            .agent-bar { width: 50px; padding: 10px 5px; }
            .agent-pill span { display: none; }
            .device-group { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>AI Team Hub</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="color: white; font-size: 0.9em; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="voiceToggle" checked> 🔊 语音
            </label>
            <button onclick="refreshAgents()" style="background:none; border:none; color:white; cursor:pointer;">🔄 刷新</button>
        </div>
    </div>
    
    <div class="chat-main">
        <div class="chat-container">
            <div class="agent-bar" id="agentBar">
                <div class="device-group">Mobile / Surface</div>
                <div class="agent-pill active" data-id="lobster">🦞 <span>龙虾-Surface</span></div>
                <div class="device-group">Local / U22</div>
                <div class="agent-pill" data-id="qwq">🦊 <span>千问-Local</span></div>
                <div class="device-group">Remote / MyCC</div>
                <div class="agent-pill" data-id="mycc">🎯 <span>Claude-Remote</span></div>
            </div>
            
            <div style="flex:1; display:flex; flex-direction:column; background:#fafafa;">
                <div class="messages" id="messageList"></div>
                <div id="atHints" style="padding: 5px 20px; font-size: 0.75em; color: #999; display: flex; gap: 10px;">
                    快速艾特: <span style="cursor:pointer; color:#667eea;" onclick="insertAt('@lobster ')">@lobster</span>
                    <span style="cursor:pointer; color:#667eea;" onclick="insertAt('@qwq ')">@qwq</span>
                    <span style="cursor:pointer; color:#667eea;" onclick="insertAt('@mycc ')">@mycc</span>
                </div>
                <div class="input-area">
                    <textarea class="input-box" id="msgInput" placeholder="在此发问..." rows="1" oninput="updatePlaceholder()"></textarea>
                    <button class="send-btn" onclick="send()">发送</button>
                </div>
            </div>
            </div>
            </div>

            <script>
            let selectedAgent = 'mycc';

            function updatePlaceholder() {
            const input = document.getElementById('msgInput');
            if (input.value.startsWith('@')) {
                input.style.borderColor = '#667eea';
            } else {
                input.style.borderColor = '#ddd';
                input.placeholder = `正在对话: ${selectedAgent}...`;
            }
            }

            function insertAt(at) {
            const input = document.getElementById('msgInput');
            input.value = at + input.value.replace(/^@\w+\s?/, '');
            input.focus();
            updatePlaceholder();
            }

        
        // 自动发现 Agents
        async function refreshAgents() {
            try {
                const res = await fetch('/api/agents');
                const agents = await res.json();
                const bar = document.getElementById('agentBar');
                bar.innerHTML = '';
                Object.keys(agents).forEach(id => {
                    const pill = document.createElement('div');
                    pill.className = `agent-pill ${id === selectedAgent ? 'active' : ''}`;
                    pill.innerText = agents[id].name;
                    pill.onclick = () => {
                        selectedAgent = id;
                        document.querySelectorAll('.agent-pill').forEach(el => el.classList.remove('active'));
                        pill.classList.add('active');
                    };
                    bar.appendChild(pill);
                });
            } catch (e) { console.error("Refresh agents failed", e); }
        }
        refreshAgents();

        async function playVoice(text) {
            if (!document.getElementById('voiceToggle').checked) return;
            const url = `/api/tts?text=${encodeURIComponent(text)}`;
            new Audio(url).play().catch(e => console.log('Audio error:', e));
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            appendMsg('user', msg);
            input.value = '';
            
            const assistantMsg = appendMsg('assistant', '');
            const bodyDiv = assistantMsg.querySelector('.content-body');
            let fullText = '';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ agent: selectedAgent, message: msg })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            fullText += data.content;
                            bodyDiv.innerHTML = fullText.replace(/\n/g, '<br>');
                            document.getElementById('messageList').scrollTop = document.getElementById('messageList').scrollHeight;
                        }
                    }
                }
                
                // 播报语音
                if (fullText) playVoice(fullText);
                
            } catch (e) {
                bodyDiv.innerText = '❌ 连接失败: ' + e.message;
            }
        }

        function appendMsg(role, content, isLoading=false, thought='', logs='') {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let inner = `<div class="msg-bubble">`;
            
            // 思考过程注入
            if (thought) {
                inner += `
                <details class="thought-panel">
                    <summary>思考过程 (已折叠)</summary>
                    <div class="thought-content">${thought}</div>
                </details>`;
            }
            
            inner += `<div class="content-body">${content.replace(/\n/g, '<br>')}</div>`;
            
            // 执行日志注入
            if (logs) {
                inner += `
                <details class="log-panel">
                    <summary>执行链记录</summary>
                    <div class="log-content">${logs}</div>
                </details>`;
            }
            
            inner += `</div>`;
            div.innerHTML = inner;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
